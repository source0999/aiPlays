game:
  adapter: pokemon_red
  rom_path: roms/pokemon_red.gb
  state_path: states/after_starter.state
emulator:
  window: null
  speed: 0
  frame_skip: 8
  action_hold_frames: 4
  release_frames: 1
  max_episode_steps: 20000
  enabled_actions: [noop, up, down, left, right, a, b, start, select]
observation:
  mode: multimodal
  grayscale: true
  width: 84
  height: 84
  frame_stack: 4
training:
  algorithm: ppo
  device: auto
  seed: 42
  num_envs: 1
  total_timesteps: 1000000
  checkpoint_frequency: 25000
  learning_rate: 0.00025
  n_steps: 128
  batch_size: 64
dashboard:
  enabled: true
  host: 127.0.0.1
  port: 8765
paths:
  models_dir: models
  logs_dir: logs
  runs_dir: runs
rewards:
  profile: pokemon_red_progress
  weights:
    new_coordinate: 0.1
    new_map: 1.0
    badge: 10.0
    step: -0.001
    stuck: -0.01
